<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>📝Quick Note Taker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <aside id="sidebar">
            <h2>📝 Notes</h2>
            <button id="new-note">➕ New Note</button>
            <div id="notes-list"></div>
            <button id="delete-all" class="danger">🗑 Delete All</button>
        </aside>

        <main id="editor">
            <h1>📝 Quick Note Taker</h1>

            <input id="note-title" type="text" placeholder="Note title">

            <textarea id="note" placeholder="Write your note here..."></textarea>

            <div id="buttons">
                <button id="save">💾 Save Note</button>
                <button id="save-as">📁 Save As</button>
                <button id="open-file">📂 Open File</button>
            </div>

            <p id="save_status">Ready</p>
            <p id="file_path"></p>
        </main>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
